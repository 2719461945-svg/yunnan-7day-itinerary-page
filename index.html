<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>云南7天旅行双方案对比</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <style>
    :root {
      --bg:#f4f7f4;
      --surface:#ffffff;
      --surface-2:#eef4f2;
      --surface-warm:#fffaf2;
      --ink:#142733;
      --muted:#607078;
      --soft:#7c8b88;
      --line:#d8e1dd;
      --line-strong:#bdccc6;
      --teal:#1f6b72;
      --teal-2:#dcecea;
      --pine:#3f714f;
      --clay:#b76543;
      --clay-2:#f7e6d8;
      --gold:#a77b32;
      --gold-2:#fff2cf;
      --blue:#2e5f87;
      --blue-2:#eaf2f8;
      --rice:#edf2df;
      --shadow:0 10px 30px rgba(31,63,61,.09);
      --shadow-soft:0 6px 20px rgba(31,63,61,.07);
      --radius:8px;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0;
      background:
        linear-gradient(180deg,#fbfaf5 0,#eef5f2 38%,#f8f4ec 100%);
      color:var(--ink);
      letter-spacing:0;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    button {
      font:inherit;
      color:inherit;
      -webkit-tap-highlight-color:transparent;
    }
    img { display:block; max-width:100%; }
    .app {
      max-width:980px;
      margin:0 auto;
      background:linear-gradient(180deg,#f8faf7 0,#f4f7f4 52%,#f7f3eb 100%);
      min-height:100vh;
    }
    .top {
      padding:calc(16px + env(safe-area-inset-top)) 14px 16px;
      background:
        linear-gradient(135deg,rgba(255,250,242,.96) 0%,rgba(238,246,241,.98) 54%,rgba(232,241,238,.96) 100%);
      border-bottom:1px solid var(--line);
      overflow:hidden;
    }
    .meta {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      margin-bottom:12px;
    }
    .eyebrow {
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:28px;
      padding:5px 9px;
      border:1px solid rgba(31,107,114,.18);
      border-radius:999px;
      color:#315d5d;
      background:rgba(255,255,255,.62);
      font-size:12px;
      font-weight:720;
      margin-bottom:10px;
    }
    h1 {
      font-size:31px;
      line-height:1.12;
      margin:0 0 10px;
      font-weight:820;
    }
    .lead {
      margin:0;
      color:#395057;
      font-size:14px;
      line-height:1.62;
    }
    .hero-layout {
      display:grid;
      gap:14px;
    }
    .hero-route {
      position:relative;
      overflow:hidden;
      border:1px solid rgba(189,204,198,.9);
      border-radius:var(--radius);
      background:#fff;
      box-shadow:var(--shadow-soft);
      min-height:154px;
    }
    .hero-route img {
      width:100%;
      height:154px;
      object-fit:cover;
      object-position:center;
    }
    .hero-route-caption {
      position:absolute;
      left:10px;
      right:10px;
      bottom:10px;
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      min-height:36px;
      padding:7px 9px;
      border:1px solid rgba(255,255,255,.7);
      border-radius:var(--radius);
      background:rgba(255,255,255,.86);
      backdrop-filter:blur(12px);
      color:#1c363a;
      font-size:12px;
      line-height:1.3;
      box-shadow:0 6px 18px rgba(24,52,60,.12);
    }
    .hero-route-caption strong {
      font-size:13px;
      max-width:58%;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }
    .hero-route-caption span:last-child {
      color:var(--muted);
      text-align:right;
    }
    .dashboard {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
      margin-top:14px;
    }
    .metric {
      min-height:72px;
      background:rgba(255,255,255,.82);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:10px 9px;
      box-shadow:0 3px 14px rgba(31,63,61,.04);
    }
    .metric b {
      display:block;
      font-size:18px;
      line-height:1.1;
      margin-bottom:4px;
      color:var(--teal);
    }
    .metric span {
      display:block;
      font-size:12px;
      line-height:1.35;
      color:var(--muted);
    }
    .sticky {
      position:sticky;
      top:0;
      z-index:20;
      padding:9px 10px 8px;
      background:rgba(248,250,247,.92);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(16px);
    }
    .plan-tabs {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      padding:4px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.76);
    }
    .plan-tab {
      min-height:44px;
      border:0;
      border-radius:7px;
      background:transparent;
      font-weight:720;
      font-size:14px;
      transition:background .18s ease,color .18s ease,box-shadow .18s ease;
    }
    .plan-tab.active {
      background:var(--teal);
      color:#fff;
      box-shadow:0 7px 18px rgba(31,107,114,.22);
    }
    .day-nav {
      display:flex;
      gap:7px;
      overflow-x:auto;
      padding:10px 1px 2px;
      scrollbar-width:none;
    }
    .day-nav::-webkit-scrollbar { display:none; }
    .day-chip {
      flex:0 0 auto;
      min-width:46px;
      height:34px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#395057;
      font-size:12px;
      line-height:1.05;
    }
    .day-chip.active {
      background:var(--teal-2);
      border-color:#86b7b0;
      color:#124a51;
      font-weight:700;
    }
    section {
      padding:20px 12px;
    }
    .section-title {
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    h2 {
      margin:0;
      font-size:20px;
      line-height:1.22;
    }
    .section-title span {
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    .summary {
      display:grid;
      gap:10px;
    }
    .card {
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:12px;
      box-shadow:var(--shadow-soft);
    }
    .route-card {
      padding:0;
      overflow:hidden;
    }
    .route-image {
      border-radius:0;
      border:0;
      border-bottom:1px solid var(--line);
      margin-bottom:0;
      background:#fafafa;
      width:100%;
    }
    .route-card-body {
      padding:12px;
    }
    .plan-name {
      color:var(--teal);
      font-size:13px;
      line-height:1.35;
      font-weight:780;
      margin-bottom:8px;
    }
    .recommend {
      border-color:#ead8b4;
      background:linear-gradient(180deg,#fffaf0,#fff);
    }
    .recommend .value {
      font-size:15px;
      color:#273d42;
    }
    .tag-row {
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:12px;
    }
    .tag {
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:5px 9px;
      border-radius:999px;
      background:#f2f6f4;
      border:1px solid #e0e9e5;
      color:#3e555a;
      font-size:12px;
      line-height:1.2;
    }
    .split {
      display:grid;
      gap:8px;
      grid-template-columns:1fr 1fr;
    }
    .label {
      color:var(--muted);
      font-size:12px;
      line-height:1.35;
      margin-bottom:4px;
    }
    .value {
      font-size:14px;
      line-height:1.5;
    }
    .timeline {
      display:grid;
      gap:12px;
    }
    .day-card {
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow-soft);
      scroll-margin-top:116px;
    }
    .day-top {
      display:grid;
      grid-template-columns:64px 1fr;
      gap:10px;
      padding:12px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(90deg,#fbfcfc 0%,#f7fbf8 100%);
    }
    .datebox {
      min-height:58px;
      border-radius:var(--radius);
      background:linear-gradient(180deg,#e4f0ed,#f6fbf8);
      color:#174d55;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:760;
      font-size:14px;
      line-height:1.2;
    }
    .datebox small {
      color:#547074;
      font-size:11px;
      font-weight:650;
      margin-top:2px;
    }
    .day-title {
      margin:0 0 5px;
      font-size:17px;
      line-height:1.25;
    }
    .base {
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }
    .slots {
      display:grid;
      gap:0;
    }
    .slot {
      display:grid;
      grid-template-columns:54px 1fr;
      gap:10px;
      padding:11px 12px;
      border-bottom:1px solid #edf1ef;
    }
    .slot:last-child { border-bottom:0; }
    .slot-name {
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      padding-top:1px;
    }
    .slot-text {
      font-size:14px;
      line-height:1.62;
      overflow-wrap:anywhere;
    }
    .drive-row {
      background:var(--gold-2);
      border-left:4px solid var(--gold);
    }
    .rain-row {
      background:var(--blue-2);
      border-left:4px solid var(--blue);
    }
    .focus-row {
      background:var(--rice);
      border-left:4px solid var(--pine);
    }
    .table-wrap {
      overflow-x:auto;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#fff;
      box-shadow:var(--shadow-soft);
    }
    table {
      width:100%;
      border-collapse:collapse;
      min-width:560px;
    }
    th, td {
      padding:10px;
      text-align:left;
      vertical-align:top;
      border-bottom:1px solid #edf1ef;
      font-size:13px;
      line-height:1.5;
    }
    th {
      position:sticky;
      top:0;
      background:#e7f0ed;
      color:#18343c;
      font-weight:760;
    }
    tr:last-child td { border-bottom:0; }
    .grid {
      display:grid;
      gap:10px;
    }
    .mini-list {
      display:grid;
      gap:8px;
      margin:0;
      padding:0;
      list-style:none;
    }
    .mini-list li {
      padding:10px;
      background:#f8faf9;
      border:1px solid #e5ece9;
      border-radius:var(--radius);
      font-size:13px;
      line-height:1.5;
    }
    .footer {
      padding:18px 12px calc(28px + env(safe-area-inset-bottom));
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }
    .top-link {
      position:fixed;
      right:12px;
      bottom:calc(12px + env(safe-area-inset-bottom));
      z-index:30;
      width:42px;
      height:42px;
      border:1px solid rgba(31,107,114,.25);
      border-radius:999px;
      background:rgba(255,255,255,.9);
      box-shadow:var(--shadow);
      color:var(--teal);
      font-size:18px;
      line-height:1;
      opacity:0;
      pointer-events:none;
      transform:translateY(8px);
      transition:opacity .18s ease,transform .18s ease;
    }
    .top-link.show {
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
    }
    .hidden { display:none !important; }
    @media (prefers-reduced-motion:reduce) {
      html { scroll-behavior:auto; }
      .plan-tab { transition:none; }
    }
    @media (min-width:760px) {
      .top { padding-left:28px; padding-right:28px; padding-bottom:22px; }
      .hero-layout { grid-template-columns:1fr 360px; align-items:end; }
      .hero-route img { height:220px; }
      h1 { font-size:40px; }
      section { padding:26px 28px; }
      .summary { grid-template-columns:1fr 1fr; }
      .timeline { grid-template-columns:1fr 1fr; align-items:start; }
      .grid { grid-template-columns:1fr 1fr; }
      .top-link { display:none; }
    }
  </style>
</head>

      </footer>
    </main>
    <button class="top-link" type="button" aria-label="回到顶部">↑</button>

  <script>
    const data = JSON.parse(document.getElementById('plan-data').textContent);
    let active = 'A';

    const $ = (s) => document.querySelector(s);

    function routeImage(plan) {
      return plan.id === 'A' ? 'assets/images/route-a.png' : 'assets/images/route-b.png';
    }
    function dayShort(date) {
      const m = date.match(/8\/(\d+)\s+Day(\d+)/);
      return m ? [`8/${m[1]}`, `D${m[2]}`] : [date, ''];
    }
    function updateHero(plan) {
      $('#heroRoute').src = routeImage(plan);
      $('#heroRoute').alt = `${plan.name}路线图预览`;
      $('#heroPlanName').textContent = plan.id === 'A' ? '方案A 沙溪' : '方案B 香格里拉';
      $('#heroNights').textContent = plan.nights;
    }
    function renderNav(plan) {
      $('#dayNav').innerHTML = plan.days.map((d, i) => {
        const [date, day] = dayShort(d.date);
        return `<button class="day-chip ${i===0?'active':''}" data-target="day-${plan.id}-${i}" aria-label="查看${d.date}">${day}<br>${date}</button>`;
      }).join('');
      $$('.day-chip').forEach(btn => btn.addEventListener('click', () => {
        $$('.day-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.target).scrollIntoView({block:'start', behavior:'smooth'});
      }));
    }
    function renderSummary(plan) {
      $('#nights').textContent = plan.nights;
      $('#planTheme').textContent = plan.theme;

            </div>
          </div>
        </article>
        <article class="card recommend">

          <div class="tag-row">
            <span class="tag">${plan.id === 'A' ? '民宿人文' : '高原自然'}</span>
            <span class="tag">${plan.id === 'A' ? '低海拔更舒服' : '藏地体验更完整'}</span>
            <span class="tag">${plan.segments.length}段车程核验</span>
          </div>
        </article>
        <article class="card">
          <div class="label">路线</div>
          <div class="value">${plan.route}</div>
          <div style="height:10px"></div>
          <div class="label">住宿</div>
          <div class="value">${plan.nights}</div>
        </article>`;
    }
    function slot(name, text, cls='') {
      return `<div class="slot ${cls}"><div class="slot-name">${name}</div><div class="slot-text">${text}</div></div>`;
    }
    function renderTimeline(plan) {
      $('#timeline').innerHTML = plan.days.map((d, i) => {
        const [date, day] = dayShort(d.date);
        return `<article class="day-card" id="day-${plan.id}-${i}">
          <div class="day-top">
            <div class="datebox">${day}<small>${date}</small></div>
            <div><h3 class="day-title">${d.title}</h3><div class="base">${d.base}</div></div>
          </div>
          <div class="slots">
            ${slot('上午', d.morning)}
            ${slot('下午', d.afternoon)}
            ${slot('晚上', d.evening)}
            ${slot('车程', d.drive, 'drive-row')}
            ${slot('重点', d.focus, 'focus-row')}
            ${slot('雨天', d.rain, 'rain-row')}
          </div>
        </article>`;
      }).join('');
    }
    function renderDrive(plan) {
      $('#driveTable').innerHTML = `<table><thead><tr><th>起点</th><th>终点</th><th>时间</th></tr></thead><tbody>${plan.segments.map(s => `<tr><td>${s.from}</td><td>${s.to}</td><td>${s.text}</td></tr>`).join('')}</tbody></table>`;
    }
    function renderHotels() {
      $('#hotels').innerHTML = Object.entries(data.hotels).map(([area, info]) => `
        <article class="card">
          <h3>${area}</h3>
          <p class="value">${info.area}</p>
          <ul class="mini-list">${info.examples.slice(0,3).map(x => `<li>${x}</li>`).join('')}</ul>
        </article>`).join('');
    }
    function renderChecks() {
      const groups = [
        ['预约提醒', data.booking],
        ['装备清单', data.packing],
        ['交通方式', data.transport.map(t => `${t.mode}：${t.fit} ${t.watch}`)]
      ];
      $('#checks').innerHTML = groups.map(([title, items]) => `
        <article class="card">
          <h3>${title}</h3>
          <ul class="mini-list">${items.map(x => `<li>${x}</li>`).join('')}</ul>
        </article>`).join('');
    }
    function observeDays(plan) {
      if (dayObserver) dayObserver.disconnect();
      const cards = plan.days.map((_, i) => document.getElementById(`day-${plan.id}-${i}`)).filter(Boolean);
      dayObserver = new IntersectionObserver((entries) => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        const id = visible.target.id;
        $$('.day-chip').forEach(chip => chip.classList.toggle('active', chip.dataset.target === id));
      }, { rootMargin:'-42% 0px -45% 0px', threshold:[0,.2,.45,.7] });
      cards.forEach(card => dayObserver.observe(card));
    }
    function render() {
      const plan = currentPlan();
      updateHero(plan);
      $$('.plan-tab').forEach(b => {
        const isActive = b.dataset.plan === active;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-pressed', String(isActive));
      });
      renderNav(plan);
      renderSummary(plan);
      renderTimeline(plan);
      renderDrive(plan);
      renderHotels();
      renderChecks();
      observeDays(plan);
    }
    $$('.plan-tab').forEach(btn => btn.addEventListener('click', () => {
      active = btn.dataset.plan;
      render();
      window.scrollTo({top:0, behavior:'smooth'});
    }));
    $('.top-link').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
    window.addEventListener('scroll', () => {
      $('.top-link').classList.toggle('show', window.scrollY > 560);
    }, { passive:true });
    render();
  </script>
</body>
</html>
