<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ea" />
  <meta name="description" content="云南7天深度旅行方案，手机优先的路线、住宿、耗时和费用总览。" />
  <title>云南7天深度旅行方案</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="preload" href="assets/css/styles.css" as="style" />
  <link rel="preload" href="assets/data/itinerary.json" as="fetch" crossorigin="anonymous" />
  <link rel="preload" href="assets/images/yunnan-overview.png" as="image" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="scroll-meter" aria-hidden="true"><span id="scrollMeter"></span></div>
  <div class="app-shell">
    <header class="hero hero--image-only" id="top">
      <img id="overviewImage" src="assets/images/yunnan-overview.png" alt="云南7天旅行总览图片" loading="eager" decoding="async" />
    </header>

    <main>
      <section class="overview-band" aria-labelledby="overviewTitle">
        <div class="section-heading">
          <h2 id="overviewTitle">路线总览</h2>
          <span id="routeText">上海 → 昆明 → 大理 → 苍山 → 海西 → 沙溪 → 丽江 → 上海</span>
        </div>
        <div class="stat-grid" id="statGrid"></div>
        <div class="route-strip" id="routeStrip" aria-label="基础路线"></div>
      </section>

      <nav class="control-bar" aria-label="行程快捷导航">
        <div class="control-bar__top">
          <div class="view-tabs" role="tablist" aria-label="日程视图">
            <button class="view-tab is-active" type="button" data-view="all">全部</button>
            <button class="view-tab" type="button" data-view="movement">交通</button>
            <button class="view-tab" type="button" data-view="stay">住宿</button>
            <button class="view-tab" type="button" data-view="cost">费用</button>
          </div>
          <button class="quiet-button" type="button" data-action="expand">展开全部</button>
        </div>
        <div class="day-nav" id="dayNav"></div>
      </nav>

      <section class="itinerary-section" aria-labelledby="dailyTitle">
        <div class="section-heading">
          <h2 id="dailyTitle">每日行程</h2>
          <span>可折叠 · 可筛选</span>
        </div>
        <div class="day-list" id="dayList"></div>
      </section>

    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <button class="top-button" id="topButton" type="button" aria-label="回到顶部">↑</button>

  <script src="assets/js/app.js" defer></script>
</body>
</html>
